naftiko: 1.0.0-alpha2
info:
  label: Abacus API — Members
  description: 'Abacus API — Members. 5 operations. Lead operation: Abacus List Members. Self-contained Naftiko capability
    covering one Abacus business surface.'
  tags:
  - Abacus
  - Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ABACUS_API_KEY: ABACUS_API_KEY
capability:
  consumes:
  - type: http
    namespace: abacus-members
    baseUri: https://api.abacus.com
    description: Abacus API — Members business capability. Self-contained, no shared references.
    resources:
    - name: members
      path: /members
      operations:
      - name: listmembers
        method: GET
        description: Abacus List Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: page
          in: query
          type: integer
          description: Page number for pagination
        - name: per_page
          in: query
          type: integer
          description: Number of results per page
      - name: invitemember
        method: POST
        description: Abacus Invite Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: members-member_id
      path: /members/{member_id}
      operations:
      - name: getmember
        method: GET
        description: Abacus Get Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatemember
        method: PUT
        description: Abacus Update Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: members-member_id-suspend
      path: /members/{member_id}/suspend
      operations:
      - name: suspendmember
        method: POST
        description: Abacus Suspend Member
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.ABACUS_API_KEY}}'
  exposes:
  - type: rest
    namespace: abacus-members-rest
    port: 8080
    description: REST adapter for Abacus API — Members. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/members
      name: members
      description: REST surface for members.
      operations:
      - method: GET
        name: listmembers
        description: Abacus List Members
        call: abacus-members.listmembers
        with:
          page: rest.page
          per_page: rest.per_page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: invitemember
        description: Abacus Invite Member
        call: abacus-members.invitemember
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/members/{member-id}
      name: members-member-id
      description: REST surface for members-member_id.
      operations:
      - method: GET
        name: getmember
        description: Abacus Get Member
        call: abacus-members.getmember
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updatemember
        description: Abacus Update Member
        call: abacus-members.updatemember
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/members/{member-id}/suspend
      name: members-member-id-suspend
      description: REST surface for members-member_id-suspend.
      operations:
      - method: POST
        name: suspendmember
        description: Abacus Suspend Member
        call: abacus-members.suspendmember
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: abacus-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Abacus API — Members. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: abacus-list-members
      description: Abacus List Members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: abacus-members.listmembers
      with:
        page: tools.page
        per_page: tools.per_page
      outputParameters:
      - type: object
        mapping: $.
