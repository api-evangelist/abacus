      description: Abacus Invite Member
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: abacus-members.invitemember
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: abacus-get-member
      description: Abacus Get Member
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: abacus-members.getmember
      outputParameters:
      - type: object
        mapping: $.
    - name: abacus-update-member
      description: Abacus Update Member
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: abacus-members.updatemember
      with:
