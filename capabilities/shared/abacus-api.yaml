naftiko: "1.0.0-alpha1"

info:
  label: "Abacus API"
  description: "Expense management API for member provisioning and expense report operations with OAuth 2.0 authentication."
  tags:
    - Abacus
    - Expense Management
    - Finance
    - Members
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      ABACUS_CLIENT_ID: ABACUS_CLIENT_ID
      ABACUS_CLIENT_SECRET: ABACUS_CLIENT_SECRET

capability:
  consumes:
    - type: http
      namespace: abacus-api
      baseUri: https://api.abacus.com
      description: "Abacus expense management API"
      authentication:
        type: bearer
        token: "{{ABACUS_ACCESS_TOKEN}}"
      resources:
        - name: members
          path: /members
          description: "Member management operations"
          operations:
            - name: list-members
              method: GET
              description: "List all organization members"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: per_page
                  in: query
                  type: integer
                  required: false
                  description: "Results per page"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: invite-member
              method: POST
              description: "Invite a new member to the organization"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: member
          path: /members/{member_id}
          description: "Individual member operations"
          operations:
            - name: get-member
              method: GET
              description: "Get details for a specific member"
              inputParameters:
                - name: member_id
                  in: path
                  type: string
                  required: true
                  description: "Member identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-member
              method: PUT
              description: "Update a member's details"
              inputParameters:
                - name: member_id
                  in: path
                  type: string
                  required: true
                  description: "Member identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: suspend-member
          path: /members/{member_id}/suspend
          description: "Member suspension operations"
          operations:
            - name: suspend-member
              method: POST
              description: "Suspend a member from the organization"
              inputParameters:
                - name: member_id
                  in: path
                  type: string
                  required: true
                  description: "Member identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: expenses
          path: /expenses
          description: "Expense report operations"
          operations:
            - name: list-expenses
              method: GET
              description: "List expense reports with filtering options"
              inputParameters:
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by expense status"
                - name: member_id
                  in: query
                  type: string
                  required: false
                  description: "Filter by member ID"
                - name: from_date
                  in: query
                  type: string
                  required: false
                  description: "Filter from date"
                - name: to_date
                  in: query
                  type: string
                  required: false
                  description: "Filter to date"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: expense
          path: /expenses/{expense_id}
          description: "Individual expense operations"
          operations:
            - name: get-expense
              method: GET
              description: "Get details for a specific expense report"
              inputParameters:
                - name: expense_id
                  in: path
                  type: string
                  required: true
                  description: "Expense identifier"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: abacus-api-rest
      resources:
        - path: /v1/members
          name: members
          description: "Member management"
          operations:
            - method: GET
              name: list-members
              description: "List all members"
              call: "abacus-api.list-members"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: invite-member
              description: "Invite a new member"
              call: "abacus-api.invite-member"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/members/{member_id}
          name: member
          description: "Individual member"
          operations:
            - method: GET
              name: get-member
              description: "Get member details"
              call: "abacus-api.get-member"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: update-member
              description: "Update member"
              call: "abacus-api.update-member"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/expenses
          name: expenses
          description: "Expense reports"
          operations:
            - method: GET
              name: list-expenses
              description: "List expenses"
              call: "abacus-api.list-expenses"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/expenses/{expense_id}
          name: expense
          description: "Individual expense"
          operations:
            - method: GET
              name: get-expense
              description: "Get expense details"
              call: "abacus-api.get-expense"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: abacus-api-mcp
      transport: http
      tools:
        - name: list-members
          description: "List all members in the organization"
          hints:
            readOnly: true
            openWorld: false
          call: "abacus-api.list-members"
          outputParameters:
            - type: object
              mapping: "$."
        - name: invite-member
          description: "Invite a new member to the organization"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "abacus-api.invite-member"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-member
          description: "Get details for a specific member"
          hints:
            readOnly: true
            openWorld: false
          call: "abacus-api.get-member"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-member
          description: "Update a member's role or department"
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "abacus-api.update-member"
          outputParameters:
            - type: object
              mapping: "$."
        - name: suspend-member
          description: "Suspend a member from the organization"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "abacus-api.suspend-member"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-expenses
          description: "List expense reports with optional status and date filters"
          hints:
            readOnly: true
            openWorld: false
          call: "abacus-api.list-expenses"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-expense
          description: "Get details for a specific expense report"
          hints:
            readOnly: true
            openWorld: false
          call: "abacus-api.get-expense"
          outputParameters:
            - type: object
              mapping: "$."
