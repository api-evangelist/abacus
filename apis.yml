description: >-
  Abacus (now part of Emburse Spend) is an expense management platform that allows businesses to streamline
  expense reporting, receipts, and reimbursements. The Abacus API is available
  to partners and enterprise customers, providing programmatic access to member
  management and expense operations using OAuth 2.0 authentication.
