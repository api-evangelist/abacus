vocabulary: "1.0.0"

info:
  provider: "Abacus"
  description: "Unified vocabulary for Abacus expense management API covering member management, expense reporting, and reimbursement workflows."
  created: "2026-04-19"
  modified: "2026-04-19"

operational:
  apis:
    - name: Abacus API
      namespace: abacus-api
      version: "1.0.0"
      baseUrl: https://api.abacus.com
      status: active
      description: Expense management API for member provisioning and expense operations

  resources:
    - name: members
      description: Organization members with expense management access
      apis:
        - abacus-api
      actions:
        - list
        - get
        - invite
        - update
        - suspend

    - name: expenses
      description: Employee expense reports with receipts and reimbursement tracking
      apis:
        - abacus-api
      actions:
        - list
        - get

  actions:
    - name: list
      description: Retrieve a paginated collection of resources
      httpMethod: GET
      pattern: read
    - name: get
      description: Retrieve a single resource by identifier
      httpMethod: GET
      pattern: read
    - name: invite
      description: Invite a new member to the organization
      httpMethod: POST
      pattern: write
    - name: update
      description: Update an existing resource
      httpMethod: PUT
      pattern: write
    - name: suspend
      description: Suspend a member from the organization
      httpMethod: POST
      pattern: write

  schemas:
    core:
      - name: Member
        description: Organization member with expense access
        keyProperties:
          - id
          - email
          - first_name
          - last_name
          - status
          - role
      - name: Expense
        description: Employee expense report
        keyProperties:
          - id
          - member_id
          - amount
          - currency
          - category
          - status

    requests:
      - name: InviteMemberRequest
        description: Request body for inviting a new member
        keyProperties:
          - email
          - first_name
          - last_name
          - role

  parameters:
    pagination:
      - name: page
        description: Page number for results pagination
        in: query
        type: integer
      - name: per_page
        description: Number of results per page
        in: query
        type: integer
    filters:
      - name: status
        description: Filter by resource status
        in: query
        type: string
      - name: from_date
        description: Filter from date
        in: query
        type: string
      - name: to_date
        description: Filter to date
        in: query
        type: string
    identifiers:
      - name: member_id
        description: Unique member identifier
        in: path
        type: string
      - name: expense_id
        description: Unique expense identifier
        in: path
        type: string

  enums:
    member_status:
      - active
      - invited
      - suspended
    member_roles:
      - employee
      - manager
      - admin
    expense_status:
      - pending
      - approved
      - rejected
      - reimbursed
    expense_categories:
      - meals
      - travel
      - lodging
      - office_supplies
      - software
      - other

  authentication:
    schemes:
      - name: OAuth2
        type: oauth2
        flow: clientCredentials
        tokenUrl: https://api.abacus.com/oauth/token
        description: OAuth 2.0 client credentials for API authentication
        scopes:
          - members:read
          - members:write
          - expenses:read

capability:
  workflows:
    - name: Expense Management
      file: capabilities/expense-management.yaml
      description: Unified workflow for member management and expense tracking
      apisConsumed:
        - Abacus API
      toolCount: 7
      personas:
        - Finance Administrator
        - HR Manager
      domains:
        - Expense Management
        - Member Administration

  personas:
    - id: finance-administrator
      name: Finance Administrator
      description: Finance team member responsible for expense approvals and reimbursements
      workflows:
        - Expense Management

    - id: hr-manager
      name: HR Manager
      description: HR manager responsible for member provisioning and access management
      workflows:
        - Expense Management

    - id: employee
      name: Employee
      description: Organization employee submitting expense reports for reimbursement
      workflows: []

  domains:
    - name: Expense Management
      description: Expense report submission, approval, and reimbursement workflows
      resources:
        - expenses
    - name: Member Administration
      description: Organization member provisioning, role management, and access control
      resources:
        - members

  namespaces:
    - name: abacus-api
      type: consumed
      baseUri: https://api.abacus.com
    - name: expense-management-api
      type: rest-exposed
      port: 8080
    - name: expense-management-mcp
      type: mcp-exposed
      port: 9090

  binds:
    - name: ABACUS_CLIENT_ID
      description: OAuth 2.0 client ID for Abacus API authentication
      workflows:
        - Expense Management
    - name: ABACUS_CLIENT_SECRET
      description: OAuth 2.0 client secret for Abacus API authentication
      workflows:
        - Expense Management

crossReference:
  - resource: members
    operations:
      - list-members
      - get-member
      - invite-member
      - update-member
      - suspend-member
    workflows:
      - Expense Management
    personas:
      - Finance Administrator
      - HR Manager

  - resource: expenses
    operations:
      - list-expenses
      - get-expense
    workflows:
      - Expense Management
    personas:
      - Finance Administrator
